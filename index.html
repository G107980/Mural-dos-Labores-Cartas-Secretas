    <!-- Implementação do window.storage usando Firebase Realtime Database -->
    <script>
        // ⚠️ Troque pelos dados do SEU projeto Firebase (veja instruções abaixo).
        const firebaseConfig = {
            apiKey: "AIzaSyBT0h30jvhRU8yp8u4e-0VbR2gG9RskpKg",
            authDomain: "mural-dos-labores-21dfb.firebaseapp.com",
            databaseURL: "https://mural-dos-labores-21dfb-default-rtdb.firebaseio.com",
            projectId: "mural-dos-labores-21dfb",
            storageBucket: "mural-dos-labores-21dfb.firebasestorage.app",
            messagingSenderId: "751676209061",
            appId: "1:751676209061:web:5777e696daa983c25b5a4c",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Prefixo para não misturar com outros dados que você venha a guardar no mesmo banco
        const STORAGE_ROOT = "mlcs";

        window.storage = {
            get: async function(key, parse) {
                try {
                    const snap = await db.ref(`${STORAGE_ROOT}/${key}`).get();
                    if (!snap.exists()) return null;
                    return { value: snap.val() };
                } catch (e) {
                    console.error("storage.get falhou:", e);
                    return null;
                }
            },
            set: async function(key, value, stringify) {
                try {
                    await db.ref(`${STORAGE_ROOT}/${key}`).set(value);
                    return true;
                } catch (e) {
                    console.error("storage.set falhou:", e);
                    return false;
                }
            }
        };
    </script>

    <!-- App em React -->
    <script type="text/babel">
        // Extrai os hooks diretamente do React global no navegador

/* ---------------------------- utilidades ---------------------------- */

const uid = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
const now = () => new Date().toISOString();
const fmtDate = (iso) => {
  try {
    return new Date(iso).toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" });
  } catch { return ""; }
};
const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

const ATTR_LABELS = { construcao: "Construção", artesMarciais: "Artes Marciais", diplomacia: "Diplomacia", medicina: "Medicina" };
const emptyAttrs = () => ({ construcao: 0, artesMarciais: 0, diplomacia: 0, medicina: 0 });

async function loadKey(key, fallback) {
  try {
    const r = await window.storage.get(key, true);
    if (!r) return fallback;
    return JSON.parse(r.value);
  } catch {
    return fallback;
  }
}
async function saveKey(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), true);
    return true;
  } catch {
    return false;
  }
}

/* =========================================================================
   TELA DE ENTRADA (login / cadastro)
   ========================================================================= */
function AuthScreen({ accounts, onAuth, firstUserIsAdmin }) {
  const hasAccounts = Object.keys(accounts).length > 0;
  const [mode, setMode] = useState(hasAccounts ? "login" : "register");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");

  useEffect(() => { setMode(hasAccounts ? "login" : "register"); }, [hasAccounts]);

  const submit = (e) => {
    e.preventDefault();
    setError("");
    const key = email.trim().toLowerCase();
    if (!key || !password) { setError("Preencha email e senha."); return; }

    if (mode === "login") {
      const acc = accounts[key];
      if (!acc || acc.password !== password) { setError("Email ou senha incorretos."); return; }
      onAuth(acc);
    } else {
      if (accounts[key]) { setError("Já existe uma conta com esse email."); return; }
      if (!name.trim()) { setError("Diga o nome do seu personagem/perfil."); return; }
      const role = !hasAccounts ? "mestra" : "jogador";
      const acc = {
        email: key, password, name: name.trim(), role,
        photo: "", description: "", coins: 0, items: [],
      };
      onAuth(acc, true);
    }
  };

  return (
    <div style={{ minHeight: "600px", display: "flex", alignItems: "center", justifyContent: "center", padding: "32px 16px" }}>
      <div className="card" style={{ maxWidth: 400, width: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div style={{ fontSize: 34, marginBottom: 6 }}>🕯️</div>
          <h1 style={{ fontSize: 21, lineHeight: 1.3 }}>Mural dos Labores<br />&amp; Cartas Secretas</h1>
          <p style={{ color: "var(--muted)", fontSize: 13, marginTop: 8, fontStyle: "italic" }}>
            {!hasAccounts ? "Nenhuma taverna fundada ainda — o primeiro a entrar torna-se a Mestra." : "Entre com sua conta de campanha."}
          </p>
        </div>

        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <label className="field-label">Email</label>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="voce@exemplo.com" autoComplete="username" />
          </div>
          {mode === "register" && (
            <div>
              <label className="field-label">Nome</label>
              <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Nome do seu perfil" />
            </div>
          )}
          <div>
            <label className="field-label">Senha</label>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" autoComplete={mode === "login" ? "current-password" : "new-password"} />
          </div>

          {error && <div style={{ color: "#e7a79c", fontSize: 13 }}>{error}</div>}

          <button type="submit" className="btn btn-primary" style={{ marginTop: 6 }}>
            {mode === "login" ? "Entrar" : hasAccounts ? "Criar conta de jogador" : "Fundar a taverna como Mestra"}
          </button>

          {hasAccounts && (
            <button type="button" className="btn btn-ghost" onClick={() => { setMode(mode === "login" ? "register" : "login"); setError(""); }}>
              {mode === "login" ? "Criar uma nova conta" : "Já tenho conta — entrar"}
            </button>
          )}
        </form>
        <p style={{ fontSize: 11, color: "var(--muted)", marginTop: 16, textAlign: "center" }}>
          Login simples da mesa — sem verificação em duas etapas. Não use senhas sensíveis de outros lugares.
        </p>
      </div>
    </div>
  );
}

/* =========================================================================
   MODAL genérico
   ========================================================================= */
function Modal({ title, onClose, children, wide }) {
  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={wide ? { maxWidth: 720 } : undefined}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontSize: 17 }}>{title}</h2>
          <button className="btn btn-ghost" style={{ padding: 6 }} onClick={onClose}><IconClose /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* =========================================================================
   PERFIL
   ========================================================================= */
function PerfilTab({ session, accounts, updateAccount, isMestra }) {
  const me = accounts[session.email];
  const [name, setName] = useState(me.name);
  const [photo, setPhoto] = useState(me.photo || "");
  const [description, setDescription] = useState(me.description || "");
  const [saved, setSaved] = useState(false);

  useEffect(() => { setName(me.name); setPhoto(me.photo || ""); setDescription(me.description || ""); }, [me.name, me.photo, me.description]);

  const save = async () => {
    await updateAccount(session.email, { name: name.trim() || me.name, photo, description });
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  const players = Object.values(accounts).filter((a) => a.role === "jogador");

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div className="card">
        <h3 style={{ fontSize: 15, marginBottom: 14 }}>Meu perfil</h3>
        <div style={{ display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
          <img src={photo || "https://placehold.co/96x96/252b3d/c9a227?text=%F0%9F%8E%AD"} alt="" className="avatar avatar-lg" />
          <div style={{ flex: 1, minWidth: 220, display: "flex", flexDirection: "column", gap: 10 }}>
            <div>
              <label className="field-label">Nome</label>
              <input value={name} onChange={(e) => setName(e.target.value)} />
            </div>
            <div>
              <label className="field-label">URL da foto</label>
              <input value={photo} onChange={(e) => setPhoto(e.target.value)} placeholder="https://..." />
            </div>
            <div>
              <label className="field-label">Descrição</label>
              <textarea rows={3} value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Quem é seu personagem?" />
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <button className="btn btn-gold" onClick={save}>Salvar perfil</button>
              {saved && <span style={{ color: "var(--sage)", fontSize: 13 }}>Salvo ✓</span>}
            </div>
          </div>
        </div>
      </div>

      {isMestra && (
        <div>
          <h3 style={{ fontSize: 15, marginBottom: 12 }}>Perfis da mesa</h3>
          {players.length === 0 && <div className="empty">Nenhum jogador entrou ainda.</div>}
          <div style={{ display: "grid", gap: 10, gridTemplateColumns: "repeat(auto-fill, minmax(240px,1fr))" }}>
            {players.map((p) => (
              <div key={p.email} className="card" style={{ display: "flex", gap: 12 }}>
                <img src={p.photo || "https://placehold.co/56x56/252b3d/c9a227?text=%F0%9F%8E%AD"} className="avatar" alt="" />
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{p.name}</div>
                  <div className="mono" style={{ fontSize: 11, color: "var(--muted)" }}>{p.email}</div>
                  <div style={{ fontSize: 13, color: "var(--ink-text)", marginTop: 4, opacity: 0.85 }}>{p.description || <em style={{ color: "var(--muted)" }}>Sem descrição.</em>}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   CARTAS SECRETAS
   ========================================================================= */
function NpcSeal({ friendship }) {
  return <div className="seal-badge">{friendship}</div>;
}

function CartasTab({ session, isMestra, npcs, accounts, letters, sendLetter }) {
  const [openNpc, setOpenNpc] = useState(null);
  const [letterText, setLetterText] = useState("");
  const [tab, setTab] = useState("npcs");

  const npcList = Object.values(npcs);
  const myLetters = Object.values(letters)
    .filter((l) => l.fromEmail === session.email)
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const submitLetter = async () => {
    if (!letterText.trim() || !openNpc) return;
    await sendLetter({
      id: uid(), fromEmail: session.email, fromName: accounts[session.email].name,
      toNpcId: openNpc.id, toNpcName: openNpc.name, content: letterText.trim(),
      timestamp: now(), status: "pendente", response: "", respondedByNpcId: "", respondedByNpcName: "", respondedAt: "",
    });
    setLetterText("");
    setOpenNpc(null);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <button className={`btn ${tab === "npcs" ? "btn-gold" : "btn-ghost"}`} onClick={() => setTab("npcs")}>NPCs</button>
        <button className={`btn ${tab === "historico" ? "btn-gold" : "btn-ghost"}`} onClick={() => setTab("historico")}>Minhas cartas ({myLetters.length})</button>
      </div>

      {tab === "npcs" && (
        npcList.length === 0 ? <div className="empty">Nenhum NPC foi cadastrado pela Mestra ainda.</div> : (
          <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))" }}>
            {npcList.map((npc) => {
              const friendship = npc.friendship?.[session.email] ?? 0;
              const unlocked = friendship >= 20;
              return (
                <div key={npc.id} className="card" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <img src={npc.photo || "https://placehold.co/56x56/252b3d/c9a227?text=NPC"} className="avatar" alt="" />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontFamily: "Cinzel, serif", color: "var(--gold-soft)", fontSize: 15 }}>{npc.name}</div>
                      <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 2 }}>Amizade</div>
                    </div>
                    <NpcSeal friendship={friendship} />
                  </div>
                  <p style={{ fontSize: 13.5, margin: 0, opacity: 0.9 }}>{npc.description}</p>
                  {npc.rumors && (
                    <div style={{ fontSize: 12.5, fontStyle: "italic", color: "var(--gold-soft)", borderLeft: "2px solid var(--gold)", paddingLeft: 8 }}>
                      "Boato: {npc.rumors}"
                    </div>
                  )}
                  <div style={{ borderTop: "1px dashed var(--line)", paddingTop: 10 }}>
                    {unlocked ? (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                        {Object.entries(npc.attributes || emptyAttrs()).map(([k, v]) => (
                          <div key={k} className="mono" style={{ fontSize: 12, display: "flex", justifyContent: "space-between", color: "var(--ink-text)" }}>
                            <span style={{ color: "var(--muted)" }}>{ATTR_LABELS[k]}</span><span>{v}/5</span>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div style={{ fontSize: 12, color: "var(--muted)", fontStyle: "italic" }}>🔒 Atributos selados — requer amizade ≥ 20 (atual: {friendship})</div>
                    )}
                  </div>
                  <button className="btn btn-primary" onClick={() => setOpenNpc(npc)}>Enviar carta</button>
                </div>
              );
            })}
          </div>
        )
      )}

      {tab === "historico" && (
        myLetters.length === 0 ? <div className="empty">Você ainda não enviou nenhuma carta.</div> : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {myLetters.map((l) => (
              <div key={l.id} className="card">
                <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
                  <span className="tag">Para {l.toNpcName}</span>
                  <span className="mono" style={{ fontSize: 11, color: "var(--muted)" }}>{fmtDate(l.timestamp)}</span>
                </div>
                <p style={{ fontSize: 13.5, margin: "10px 0", opacity: 0.9 }}>{l.content}</p>
                {l.status === "respondida" ? (
                  <div style={{ background: "var(--ink-3)", borderRadius: 8, padding: 10, borderLeft: "3px solid var(--gold)" }}>
                    <div style={{ fontSize: 11.5, color: "var(--gold-soft)", marginBottom: 4 }}>Resposta de {l.respondedByNpcName} · {fmtDate(l.respondedAt)}</div>
                    <div style={{ fontSize: 13.5 }}>{l.response}</div>
                  </div>
                ) : (
                  <div style={{ fontSize: 12, color: "var(--muted)", fontStyle: "italic" }}>Aguardando resposta...</div>
                )}
              </div>
            ))}
          </div>
        )
      )}

      {openNpc && (
        <Modal title={`Carta para ${openNpc.name}`} onClose={() => { setOpenNpc(null); setLetterText(""); }}>
          <textarea rows={6} value={letterText} onChange={(e) => setLetterText(e.target.value)} placeholder="Escreva sua carta secreta..." />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 14 }}>
            <button className="btn btn-ghost" onClick={() => { setOpenNpc(null); setLetterText(""); }}>Cancelar</button>
            <button className="btn btn-primary" onClick={submitLetter} disabled={!letterText.trim()}>Selar e enviar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ItemForm({ initial, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || "");
  const [photo, setPhoto] = useState(initial?.photo || "");
  const [description, setDescription] = useState(initial?.description || "");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div><label className="field-label">Nome do item</label><input value={name} onChange={(e) => setName(e.target.value)} /></div>
      <div><label className="field-label">URL da foto</label><input value={photo} onChange={(e) => setPhoto(e.target.value)} placeholder="https://..." /></div>
      <div><label className="field-label">Descrição</label><textarea rows={3} value={description} onChange={(e) => setDescription(e.target.value)} /></div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 6 }}>
        <button className="btn btn-ghost" onClick={onCancel}>Cancelar</button>
        <button className="btn btn-primary" disabled={!name.trim()} onClick={() => onSave({ id: initial?.id || uid(), name: name.trim(), photo, description })}>Salvar</button>
      </div>
    </div>
  );
}

function InventoryBlock({ title, coins, items, editable, onAddItem, onEditItem, onDeleteItem, onSetCoins }) {
  const [formOpen, setFormOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [coinDraft, setCoinDraft] = useState(coins);
  useEffect(() => setCoinDraft(coins), [coins]);

  return (
    <div className="card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
        <h3 style={{ fontSize: 15 }}>{title}</h3>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <IconCoin />
          {editable ? (
            <>
              <input className="mono" style={{ width: 90 }} type="number" value={coinDraft} onChange={(e) => setCoinDraft(e.target.value)} />
              {Number(coinDraft) !== coins && <button className="btn btn-gold" style={{ padding: "6px 10px" }} onClick={() => onSetCoins(clamp(Number(coinDraft) || 0, 0, 999999))}>Definir</button>}
            </>
          ) : (
            <span className="mono" style={{ color: "var(--gold-soft)" }}>{coins} moedas</span>
          )}
        </div>
      </div>

      {items.length === 0 ? (
        <div className="empty" style={{ padding: 20 }}>Nenhum item.</div>
      ) : (
        <div style={{ display: "grid", gap: 10, gridTemplateColumns: "repeat(auto-fill, minmax(200px,1fr))" }}>
          {items.map((it) => (
            <div key={it.id} className="card" style={{ background: "var(--ink-3)", padding: 12 }}>
              <div style={{ display: "flex", gap: 10 }}>
                <img src={it.photo || "https://placehold.co/44x44/1c2130/c9a227?text=%F0%9F%93%A6"} alt="" style={{ width: 44, height: 44, borderRadius: 6, objectFit: "cover", flexShrink: 0 }} />
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 13.5 }}>{it.name}</div>
                  <div style={{ fontSize: 12, color: "var(--muted)" }}>{it.description}</div>
                </div>
              </div>
              {editable && (
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button className="btn btn-ghost" style={{ padding: "4px 9px", fontSize: 12 }} onClick={() => setEditing(it)}>Editar</button>
                  <button className="btn btn-danger" style={{ padding: "4px 9px", fontSize: 12 }} onClick={() => onDeleteItem(it.id)}>Excluir</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {editable && (
        <button className="btn btn-gold" style={{ marginTop: 12 }} onClick={() => setFormOpen(true)}>+ Novo item</button>
      )}

      {(formOpen || editing) && (
        <Modal title={editing ? "Editar item" : "Novo item"} onClose={() => { setFormOpen(false); setEditing(null); }}>
          <ItemForm
            initial={editing}
            onCancel={() => { setFormOpen(false); setEditing(null); }}
            onSave={(item) => { editing ? onEditItem(item) : onAddItem(item); setFormOpen(false); setEditing(null); }}
          />
        </Modal>
      )}
    </div>
  );
}

function InventarioTab({ session, isMestra, accounts, updateAccount, npcs, updateNpc }) {
  const me = accounts[session.email];
  const [viewingEmail, setViewingEmail] = useState(session.email);
  const [viewingNpcId, setViewingNpcId] = useState(null);

  const players = Object.values(accounts).filter((a) => a.role === "jogador");

  const setPlayerItems = async (email, items) => updateAccount(email, { items });
  const setPlayerCoins = async (email, coins) => updateAccount(email, { coins });

  if (!isMestra) {
    return (
      <InventoryBlock
        title="Meu inventário" coins={me.coins || 0} items={me.items || []} editable
        onAddItem={(item) => setPlayerItems(session.email, [...(me.items || []), item])}
        onEditItem={(item) => setPlayerItems(session.email, (me.items || []).map((i) => (i.id === item.id ? item : i)))}
        onDeleteItem={(id) => setPlayerItems(session.email, (me.items || []).filter((i) => i.id !== id))}
        onSetCoins={(v) => setPlayerCoins(session.email, v)}
      />
    );
  }

  const viewedPlayer = accounts[viewingEmail];
  const npcList = Object.values(npcs);
  const viewedNpc = viewingNpcId ? npcs[viewingNpcId] : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div>
          <label className="field-label">Ver inventário do jogador</label>
          <select value={viewingEmail} onChange={(e) => { setViewingEmail(e.target.value); setViewingNpcId(null); }}>
            {players.map((p) => <option key={p.email} value={p.email}>{p.name}</option>)}
          </select>
        </div>
        <div>
          <label className="field-label">ou gerenciar inventário de NPC</label>
          <select value={viewingNpcId || ""} onChange={(e) => setViewingNpcId(e.target.value || null)}>
            <option value="">— Nenhum —</option>
            {npcList.map((n) => <option key={n.id} value={n.id}>{n.name}</option>)}

        </div>

      {viewedNpc ? (
        <InventoryBlock
          title={`Inventário de ${viewedNpc.name}`} coins={viewedNpc.coins || 0} items={viewedNpc.inventory || []} editable
          onAddItem={(item) => updateNpc(viewedNpc.id, { inventory: [...(viewedNpc.inventory || []), item] })}
          onEditItem={(item) => updateNpc(viewedNpc.id, { inventory: (viewedNpc.inventory || []).map((i) => (i.id === item.id ? item : i)) })}
          onDeleteItem={(id) => updateNpc(viewedNpc.id, { inventory: (viewedNpc.inventory || []).filter((i) => i.id !== id) })}
          onSetCoins={(v) => updateNpc(viewedNpc.id, { coins: v })}
        />
      ) : viewedPlayer ? (
        <InventoryBlock
          title={`Inventário de ${viewedPlayer.name}`} coins={viewedPlayer.coins || 0} items={viewedPlayer.items || []} editable={false}
          onAddItem={() => {}} onEditItem={() => {}} onDeleteItem={() => {}} onSetCoins={() => {}}
        />
      ) : <div className="empty">Nenhum jogador cadastrado.</div>}
    </div>
  );
}

/* =========================================================================
   TROCAS
   ========================================================================= */
function TrocasTab({ session, isMestra, accounts, updateAccount, npcs, updateNpc, trades, saveTrades }) {
  const me = accounts[session.email];
  const [formOpen, setFormOpen] = useState(false);
  const [ownerType, setOwnerType] = useState("jogador");
  const [ownerNpcId, setOwnerNpcId] = useState("");
  const [itemName, setItemName] = useState("");
  const [itemPhoto, setItemPhoto] = useState("");
  const [itemDescription, setItemDescription] = useState("");
  const [wantType, setWantType] = useState("item");
  const [wantAmount, setWantAmount] = useState(0);
  const [wantDescription, setWantDescription] = useState("");

  const npcList = Object.values(npcs);
  const list = Object.values(trades).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  const resetForm = () => {
    setOwnerType("jogador"); setOwnerNpcId(""); setItemName(""); setItemPhoto(""); setItemDescription("");
    setWantType("item"); setWantAmount(0); setWantDescription(""); setFormOpen(false);
  };

  const publish = async () => {
    if (!itemName.trim()) return;
    const owner = ownerType === "npc" ? npcs[ownerNpcId] : null;
    const trade = {
      id: uid(),
      ownerType, ownerId: ownerType === "npc" ? ownerNpcId : session.email,
      ownerName: ownerType === "npc" ? owner?.name : me.name,
      itemName: itemName.trim(), itemPhoto, itemDescription,
      wantType, wantAmount: Number(wantAmount) || 0, wantDescription,
      status: "aberta", createdAt: now(),
    };
    await saveTrades({ ...trades, [trade.id]: trade });
    resetForm();
  };

  const removeItemFromOwner = async (trade) => {
    if (trade.ownerType === "npc") {
      const npc = npcs[trade.ownerId];
      if (npc) await updateNpc(npc.id, { inventory: (npc.inventory || []).filter((i) => i.name !== trade.itemName) });
    } else {
      const acc = accounts[trade.ownerId];
      if (acc) await updateAccount(trade.ownerId, { items: (acc.items || []).filter((i) => i.name !== trade.itemName) });
    }
  };

  const acceptTrade = async (trade) => {
    // só jogadores aceitam trocas (a Mestra representa NPCs anunciando, não aceitando)
    if (isMestra) return;
    if (trade.ownerType === "jogador" && trade.ownerId === session.email) return;

    if (trade.wantType === "dinheiro") {
      if ((me.coins || 0) < trade.wantAmount) { alert("Moedas insuficientes."); return; }
      await updateAccount(session.email, {
        coins: (me.coins || 0) - trade.wantAmount,
        items: [...(me.items || []), { id: uid(), name: trade.itemName, photo: trade.itemPhoto, description: trade.itemDescription }],
      });
      if (trade.ownerType === "npc") {
        const npc = npcs[trade.ownerId];
        if (npc) await updateNpc(npc.id, { coins: (npc.coins || 0) + trade.wantAmount });
      } else {
        const owner = accounts[trade.ownerId];
        if (owner) await updateAccount(trade.ownerId, { coins: (owner.coins || 0) + trade.wantAmount });
      }
      await removeItemFromOwner(trade);
    } else {
      // item ou trabalho: transferência do item anunciado é confirmada manualmente pela mesa
      await updateAccount(session.email, {
        items: [...(me.items || []), { id: uid(), name: trade.itemName, photo: trade.itemPhoto, description: trade.itemDescription }],
      });
      await removeItemFromOwner(trade);
    }
    await saveTrades({ ...trades, [trade.id]: { ...trade, status: "concluída", acceptedBy: me.name } });
  };

  const cancelTrade = async (trade) => {
    const rest = { ...trades };
    delete rest[trade.id];
    await saveTrades(rest);
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: 0 }}>Anúncios de troca da mesa — por item, dinheiro ou trabalho.</p>
        <button className="btn btn-gold" onClick={() => setFormOpen(true)}>+ Anunciar troca</button>
      </div>

      {list.length === 0 ? <div className="empty">Nenhuma troca anunciada ainda.</div> : (
        <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))" }}>
          {list.map((t) => (
            <div key={t.id} className="card">
              <div style={{ display: "flex", gap: 10 }}>
                <img src={t.itemPhoto || "https://placehold.co/48x48/1c2130/c9a227?text=%F0%9F%93%A6"} alt="" style={{ width: 48, height: 48, borderRadius: 6, objectFit: "cover" }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600 }}>{t.itemName}</div>
                  <span className="tag">{t.ownerType === "npc" ? `NPC · ${t.ownerName}` : t.ownerName}</span>
                </div>
              </div>
              <p style={{ fontSize: 13, opacity: 0.85, margin: "10px 0" }}>{t.itemDescription}</p>
              <div className="mono" style={{ fontSize: 12.5, color: "var(--gold-soft)" }}>
                Deseja: {t.wantType === "dinheiro" ? `${t.wantAmount} moedas` : t.wantType === "trabalho" ? "trabalho" : "item"}
                {t.wantDescription ? ` — ${t.wantDescription}` : ""}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                <span className="tag" style={{ color: t.status === "aberta" ? "var(--sage)" : "var(--muted)" }}>{t.status}</span>
                {t.status === "aberta" && !isMestra && !(t.ownerType === "jogador" && t.ownerId === session.email) && (
                  <button className="btn btn-primary" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => acceptTrade(t)}>Aceitar</button>
                )}
                {(isMestra || t.ownerId === session.email) && t.status === "aberta" && (
                  <button className="btn btn-danger" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => cancelTrade(t)}>Remover</button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {formOpen && (
        <Modal title="Anunciar troca" onClose={resetForm}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {isMestra && (
              <div>
                <label className="field-label">Anunciante</label>
                <select value={ownerType} onChange={(e) => setOwnerType(e.target.value)}>
                  <option value="jogador">Eu (Mestra)</option>
                  <option value="npc">Um NPC</option>
                </select>
              </div>
            )}
            {isMestra && ownerType === "npc" && (
              <div>
                <label className="field-label">Qual NPC</label>
                <select value={ownerNpcId} onChange={(e) => setOwnerNpcId(e.target.value)}>
                  <option value="">Selecione...</option>
                  {npcList.map((n) => <option key={n.id} value={n.id}>{n.name}</option>)}
                </select>
              </div>
            )}
            <div><label className="field-label">Item oferecido</label><input value={itemName} onChange={(e) => setItemName(e.target.value)} /></div>
            <div><label className="field-label">URL da foto</label><input value={itemPhoto} onChange={(e) => setItemPhoto(e.target.value)} placeholder="https://..." /></div>
            <div><label className="field-label">Descrição do item</label><textarea rows={2} value={itemDescription} onChange={(e) => setItemDescription(e.target.value)} /></div>
            <div>
              <label className="field-label">Deseja em troca</label>
              <select value={wantType} onChange={(e) => setWantType(e.target.value)}>
                <option value="item">Outro item</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="trabalho">Trabalho</option>
              </select>
            </div>
            {wantType === "dinheiro" && (
              <div><label className="field-label">Quantidade de moedas</label><input type="number" className="mono" value={wantAmount} onChange={(e) => setWantAmount(e.target.value)} /></div>
            )}
            <div><label className="field-label">Detalhes do que deseja</label><textarea rows={2} value={wantDescription} onChange={(e) => setWantDescription(e.target.value)} placeholder="Ex: uma poção de cura, ou reparo de uma armadura..." /></div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 6 }}>
              <button className="btn btn-ghost" onClick={resetForm}>Cancelar</button>
              <button className="btn btn-primary" disabled={!itemName.trim() || (isMestra && ownerType === "npc" && !ownerNpcId)} onClick={publish}>Publicar</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

   MURAL
   ========================================================================= */
function MuralTab({ session, isMestra, accounts, npcs, mural, saveMural }) {
  const [content, setContent] = useState("");
  const [authorType, setAuthorType] = useState("jogador");
  const [npcId, setNpcId] = useState("");
  const me = accounts[session.email];
  const npcList = Object.values(npcs);

  const posts = Object.values(mural).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const publish = async () => {
    if (!content.trim()) return;
    let authorName = me.name, aType = "jogador", authorId = session.email;
    if (isMestra) {
      if (authorType === "npc") {
        const npc = npcs[npcId];
        if (!npc) return;
        authorName = npc.name; aType = "npc"; authorId = npc.id;
      } else {
        authorName = me.name; aType = "jogador"; authorId = session.email;
      }
    }
    const post = { id: uid(), authorType: aType, authorId, authorName, content: content.trim(), timestamp: now() };
    await saveMural({ ...mural, [post.id]: post });
    setContent(""); setNpcId("");
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: 18 }}>
        <label className="field-label">Novo aviso no mural</label>
        {isMestra && (
          <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
            <select value={authorType} onChange={(e) => setAuthorType(e.target.value)} style={{ maxWidth: 200 }}>
              <option value="jogador">Publicar como Mestra</option>
              <option value="npc">Publicar como NPC</option>
            </select>
            {authorType === "npc" && (
              <select value={npcId} onChange={(e) => setNpcId(e.target.value)}>
                <option value="">Selecione o NPC...</option>
                {npcList.map((n) => <option key={n.id} value={n.id}>{n.name}</option>)}
              </select>
            )}
          </div>
        )}
        <textarea rows={3} value={content} onChange={(e) => setContent(e.target.value)} placeholder="Escreva o aviso..." />
        <div style={{ textAlign: "right", marginTop: 8 }}>
          <button className="btn btn-primary" disabled={!content.trim() || (isMestra && authorType === "npc" && !npcId)} onClick={publish}>Publicar</button>
        </div>
      </div>

      {posts.length === 0 ? <div className="empty">O mural está vazio.</div> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {posts.map((p) => (
            <div key={p.id} className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span className="tag" style={{ color: p.authorType === "npc" ? "var(--gold-soft)" : "var(--sage)" }}>
                  {p.authorType === "npc" ? "NPC" : "Jogador"} · {p.authorName}
                </span>
                <span className="mono" style={{ fontSize: 11, color: "var(--muted)" }}>{fmtDate(p.timestamp)}</span>
              </div>
              <p style={{ margin: 0, fontSize: 14 }}>{p.content}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

   MISSÕES
   ========================================================================= */
function MissoesTab({ session, isMestra, accounts, npcs, missions, saveMissions }) {
  const me = accounts[session.email];
  const npcList = Object.values(npcs);
  const [formOpen, setFormOpen] = useState(false);
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [reward, setReward] = useState("");
  const [maxParticipants, setMaxParticipants] = useState(1);
  const [creatorType, setCreatorType] = useState("jogador");
  const [creatorNpcId, setCreatorNpcId] = useState("");

  const list = Object.values(missions).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  const resetForm = () => {
    setTitle(""); setDescription(""); setReward(""); setMaxParticipants(1); setCreatorType("jogador"); setCreatorNpcId(""); setFormOpen(false);
  };

  const create = async () => {
    if (!title.trim()) return;
    let creatorName = me.name, cType = "jogador", creatorId = session.email;
    if (isMestra && creatorType === "npc") {
      const npc = npcs[creatorNpcId];
      if (!npc) return;
      creatorName = npc.name; cType = "npc"; creatorId = npc.id;
    }
    const mission = {
      id: uid(), title: title.trim(), description, reward, maxParticipants: clamp(Number(maxParticipants) || 1, 1, 99),
      participants: [], creatorType: cType, creatorId, creatorName, createdAt: now(), status: "aberta",
    };
    await saveMissions({ ...missions, [mission.id]: mission });
    resetForm();
  };

  const join = async (mission) => {
    if (isMestra) return;
    if (mission.participants.some((p) => p.id === session.email)) return;
    if (mission.participants.length >= mission.maxParticipants) return;
    const participants = [...mission.participants, { type: "jogador", id: session.email, name: me.name }];
    await saveMissions({ ...missions, [mission.id]: { ...mission, participants, status: participants.length >= mission.maxParticipants ? "fechada" : "aberta" } });
  };

  const leave = async (mission) => {
    const participants = mission.participants.filter((p) => p.id !== session.email);
    await saveMissions({ ...missions, [mission.id]: { ...mission, participants, status: "aberta" } });
  };

  const remove = async (mission) => {
    const rest = { ...missions };
    delete rest[mission.id];
    await saveMissions(rest);
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: 0 }}>Trabalhos e labores disponíveis para a companhia.</p>
        <button className="btn btn-gold" onClick={() => setFormOpen(true)}>+ Nova missão</button>
      </div>

      {list.length === 0 ? <div className="empty">Nenhuma missão publicada ainda.</div> : (
        <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fill, minmax(270px,1fr))" }}>
          {list.map((m) => {
            const joined = m.participants.some((p) => p.id === session.email);
            const full = m.participants.length >= m.maxParticipants;
            return (
              <div key={m.id} className="card">
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <h3 style={{ fontSize: 15 }}>{m.title}</h3>
                  <span className="tag" style={{ color: full ? "var(--seal)" : "var(--sage)" }}>{full ? "lotada" : "aberta"}</span>
                </div>
                <div className="tag" style={{ marginTop: 6 }}>{m.creatorType === "npc" ? `NPC · ${m.creatorName}` : m.creatorName}</div>
                <p style={{ fontSize: 13.5, opacity: 0.9, margin: "10px 0" }}>{m.description}</p>
                {m.reward && <div className="mono" style={{ fontSize: 12.5, color: "var(--gold-soft)" }}>Recompensa: {m.reward}</div>}
                <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 6 }}>
                  Participantes ({m.participants.length}/{m.maxParticipants}): {m.participants.map((p) => p.name).join(", ") || "—"}
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                  {!isMestra && !joined && !full && <button className="btn btn-primary" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => join(m)}>Participar</button>}
                  {!isMestra && joined && <button className="btn btn-ghost" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => leave(m)}>Sair da missão</button>}
                  {isMestra && <button className="btn btn-danger" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => remove(m)}>Excluir</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {formOpen && (
        <Modal title="Nova missão" onClose={resetForm}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {isMestra && (
              <div>
                <label className="field-label">Criador</label>
                <select value={creatorType} onChange={(e) => setCreatorType(e.target.value)}>
                  <option value="jogador">Eu (Mestra)</option>
                  <option value="npc">Um NPC</option>
                </select>
              </div>
            )}
            {isMestra && creatorType === "npc" && (
              <div>
                <label className="field-label">Qual NPC</label>
                <select value={creatorNpcId} onChange={(e) => setCreatorNpcId(e.target.value)}>
                  <option value="">Selecione...</option>
                  {npcList.map((n) => <option key={n.id} value={n.id}>{n.name}</option>)}
                </select>
              </div>
            )}
            <div><label className="field-label">Título</label><input value={title} onChange={(e) => setTitle(e.target.value)} /></div>
            <div><label className="field-label">Descrição</label><textarea rows={3} value={description} onChange={(e) => setDescription(e.target.value)} /></div>
            <div><label className="field-label">Recompensa</label><input value={reward} onChange={(e) => setReward(e.target.value)} placeholder="Ex: 50 moedas, um item raro..." /></div>
            <div><label className="field-label">Limite de participantes</label><input type="number" className="mono" min={1} value={maxParticipants} onChange={(e) => setMaxParticipants(e.target.value)} /></div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 6 }}>
              <button className="btn btn-ghost" onClick={resetForm}>Cancelar</button>
              <button className="btn btn-primary" disabled={!title.trim() || (isMestra && creatorType === "npc" && !creatorNpcId)} onClick={create}>Publicar missão</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* =========================================================================
   PAINEL DA MESTRA (NPCs + Cartas recebidas)
   ========================================================================= */
function NpcForm({ initial, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || "");
  const [photo, setPhoto] = useState(initial?.photo || "");
  const [description, setDescription] = useState(initial?.description || "");
  const [rumors, setRumors] = useState(initial?.rumors || "");
  const [attrs, setAttrs] = useState(initial?.attributes || emptyAttrs());

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div><label className="field-label">Nome</label><input value={name} onChange={(e) => setName(e.target.value)} /></div>
      <div><label className="field-label">URL da foto</label><input value={photo} onChange={(e) => setPhoto(e.target.value)} placeholder="https://..." /></div>
      <div><label className="field-label">Descrição</label><textarea rows={3} value={description} onChange={(e) => setDescription(e.target.value)} /></div>
      <div><label className="field-label">Boatos</label><textarea rows={2} value={rumors} onChange={(e) => setRumors(e.target.value)} /></div>
      <div>
        <label className="field-label">Atributos (0 a 5)</label>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {Object.keys(emptyAttrs()).map((k) => (
            <div key={k}>
              <label style={{ fontSize: 12, color: "var(--muted)" }}>{ATTR_LABELS[k]}</label>
              <input type="number" className="mono" min={0} max={5} value={attrs[k]} onChange={(e) => setAttrs({ ...attrs, [k]: clamp(Number(e.target.value) || 0, 0, 5) })} />
            </div>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 6 }}>
        <button className="btn btn-ghost" onClick={onCancel}>Cancelar</button>
        <button
          className="btn btn-primary" disabled={!name.trim()}
          onClick={() => onSave({
            id: initial?.id || uid(), name: name.trim(), photo, description, rumors, attributes: attrs,
            friendship: initial?.friendship || {}, inventory: initial?.inventory || [], coins: initial?.coins || 0,
          })}
        >Salvar NPC</button>
      </div>
    </div>
  );
}

function NpcFriendshipEditor({ npc, accounts, updateNpc }) {
  const players = Object.values(accounts).filter((a) => a.role === "jogador");
  const [drafts, setDrafts] = useState({});
  if (players.length === 0) return <div className="empty" style={{ padding: 14 }}>Nenhum jogador na mesa ainda.</div>;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {players.map((p) => {
        const current = npc.friendship?.[p.email] ?? 0;
        const draft = drafts[p.email] ?? current;
        return (
          <div key={p.email} style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ flex: 1, fontSize: 13.5 }}>{p.name}</span>
            <input type="number" className="mono" style={{ width: 90 }} min={-100} max={100} value={draft}
              onChange={(e) => setDrafts({ ...drafts, [p.email]: e.target.value })} />
            {Number(draft) !== current && (
              <button className="btn btn-gold" style={{ padding: "5px 10px", fontSize: 12 }}
                onClick={() => updateNpc(npc.id, { friendship: { ...(npc.friendship || {}), [p.email]: clamp(Number(draft) || 0, -100, 100) } })}
              >Definir</button>
            )}
          </div>
        );
      })}
    </div>
  );
}

function AdminPanel({ npcs, updateNpc, addNpc, deleteNpc, accounts, letters, respondLetter }) {
  const [section, setSection] = useState("npcs");
  const [npcFormOpen, setNpcFormOpen] = useState(false);
  const [editingNpc, setEditingNpc] = useState(null);
  const [friendshipNpc, setFriendshipNpc] = useState(null);
  const [respondingLetter, setRespondingLetter] = useState(null);
  const [responseNpcId, setResponseNpcId] = useState("");
  const [responseText, setResponseText] = useState("");

  const npcList = Object.values(npcs);
  const pendingLetters = Object.values(letters).filter((l) => l.status === "pendente").sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  const answeredLetters = Object.values(letters).filter((l) => l.status === "respondida").sort((a, b) => new Date(b.respondedAt) - new Date(a.respondedAt));

  const submitResponse = async () => {
    if (!responseNpcId || !responseText.trim() || !respondingLetter) return;
    const npc = npcs[responseNpcId];
    await respondLetter(respondingLetter.id, { response: responseText.trim(), respondedByNpcId: npc.id, respondedByNpcName: npc.name, respondedAt: now(), status: "respondida" });
    setRespondingLetter(null); setResponseNpcId(""); setResponseText("");
  };

  return (
    <div>
      <div className="card" style={{ marginBottom: 18, background: "var(--ink-3)", borderColor: "var(--gold)" }}>
        <h2 style={{ fontSize: 16 }}>🔑 Painel da Mestra</h2>
        <p style={{ fontSize: 12.5, color: "var(--muted)", margin: "6px 0 0" }}>Visível apenas para você.</p>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
        <button className={`btn ${section === "npcs" ? "btn-gold" : "btn-ghost"}`} onClick={() => setSection("npcs")}>NPCs</button>
        <button className={`btn ${section === "cartas" ? "btn-gold" : "btn-ghost"}`} onClick={() => setSection("cartas")}>Cartas recebidas ({pendingLetters.length})</button>
      </div>

      {section === "npcs" && (
        <div>
          <button className="btn btn-gold" style={{ marginBottom: 14 }} onClick={() => setNpcFormOpen(true)}>+ Novo NPC</button>
          {npcList.length === 0 ? <div className="empty">Nenhum NPC cadastrado.</div> : (
            <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fill, minmax(270px,1fr))" }}>
              {npcList.map((npc) => (
                <div key={npc.id} className="card">
                  <div style={{ display: "flex", gap: 10 }}>
                    <img src={npc.photo || "https://placehold.co/48x48/1c2130/c9a227?text=NPC"} className="avatar" alt="" style={{ width: 48, height: 48 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, color: "var(--gold-soft)" }}>{npc.name}</div>
                      <div style={{ fontSize: 12, color: "var(--muted)" }}>{npc.coins || 0} moedas · {(npc.inventory || []).length} itens</div>
                    </div>
                  </div>
                  <p style={{ fontSize: 13, opacity: 0.85, margin: "10px 0" }}>{npc.description}</p>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <button className="btn btn-ghost" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setEditingNpc(npc)}>Editar</button>
                    <button className="btn btn-ghost" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setFriendshipNpc(npc)}>Amizades</button>
                    <button className="btn btn-danger" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => { if (confirm(`Excluir ${npc.name}?`)) deleteNpc(npc.id); }}>Excluir</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {section === "cartas" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div>
            <h3 style={{ fontSize: 14, marginBottom: 10 }}>Pendentes</h3>
            {pendingLetters.length === 0 ? <div className="empty">Nenhuma carta pendente.</div> : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {pendingLetters.map((l) => (
                  <div key={l.id} className="card">
                    <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
                      <span className="tag">{l.fromName} → {l.toNpcName}</span>
                      <span className="mono" style={{ fontSize: 11, color: "var(--muted)" }}>{fmtDate(l.timestamp)}</span>
                    </div>
                    <p style={{ fontSize: 13.5, margin: "8px 0" }}>{l.content}</p>
                    <button className="btn btn-primary" style={{ padding: "6px 12px", fontSize: 12.5 }}
                      onClick={() => { setRespondingLetter(l); setResponseNpcId(l.toNpcId); setResponseText(""); }}
                    >Responder</button>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div>
            <h3 style={{ fontSize: 14, marginBottom: 10 }}>Respondidas ({answeredLetters.length})</h3>
            {answeredLetters.length === 0 ? <div className="empty">Nenhuma carta respondida ainda.</div> : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {answeredLetters.map((l) => (
                  <div key={l.id} className="card" style={{ opacity: 0.85 }}>
                    <span className="tag">{l.fromName} → {l.respondedByNpcName}</span>
                    <p style={{ fontSize: 13, margin: "8px 0 4px" }}>{l.content}</p>
                    <div style={{ fontSize: 13, borderLeft: "3px solid var(--gold)", paddingLeft: 8 }}>{l.response}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {(npcFormOpen || editingNpc) && (
        <Modal title={editingNpc ? `Editar ${editingNpc.name}` : "Novo NPC"} onClose={() => { setNpcFormOpen(false); setEditingNpc(null); }}>
          <NpcForm
            initial={editingNpc}
            onCancel={() => { setNpcFormOpen(false); setEditingNpc(null); }}
            onSave={(npc) => { editingNpc ? updateNpc(npc.id, npc) : addNpc(npc); setNpcFormOpen(false); setEditingNpc(null); }}
          />
        </Modal>
      )}

      {friendshipNpc && (
        <Modal title={`Amizade — ${friendshipNpc.name}`} onClose={() => setFriendshipNpc(null)}>
          <NpcFriendshipEditor npc={npcs[friendshipNpc.id] || friendshipNpc} accounts={accounts} updateNpc={updateNpc} />
        </Modal>
      )}

      {respondingLetter && (
        <Modal title={`Responder carta de ${respondingLetter.fromName}`} onClose={() => setRespondingLetter(null)}>
          <div style={{ background: "var(--ink-3)", borderRadius: 8, padding: 10, marginBottom: 12, fontSize: 13.5 }}>{respondingLetter.content}</div>
          <label className="field-label">Responder como qual NPC</label>
          <select value={responseNpcId} onChange={(e) => setResponseNpcId(e.target.value)} style={{ marginBottom: 10 }}>
            {npcList.map((n) => <option key={n.id} value={n.id}>{n.name}</option>)}
          </select>
          <label className="field-label">Resposta</label>
          <textarea rows={5} value={responseText} onChange={(e) => setResponseText(e.target.value)} />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 14 }}>
            <button className="btn btn-ghost" onClick={() => setRespondingLetter(null)}>Cancelar</button>
            <button className="btn btn-primary" disabled={!responseText.trim() || !responseNpcId} onClick={submitResponse}>Enviar resposta</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* =========================================================================
   APP
   ========================================================================= */
const TABS = [
  { id: "perfil", label: "Perfil" },
  { id: "cartas", label: "Cartas Secretas" },
  { id: "inventario", label: "Inventário" },
  { id: "trocas", label: "Trocas" },
  { id: "mural", label: "Mural" },
  { id: "missoes", label: "Missões" },
];

function App() {
  const [loading, setLoading] = useState(true);
  const [session, setSession] = useState(null);
  const [accounts, setAccounts] = useState({});
  const [npcs, setNpcs] = useState({});
  const [letters, setLetters] = useState({});
  const [mural, setMural] = useState({});
  const [missions, setMissions] = useState({});
  const [trades, setTrades] = useState({});
  const [activeTab, setActiveTab] = useState("perfil");

  useEffect(() => {
    (async () => {
      const [acc, np, lt, mu, mi, tr] = await Promise.all([
        loadKey("mlcs_accounts", {}),
        loadKey("mlcs_npcs", {}),
        loadKey("mlcs_letters", {}),
        loadKey("mlcs_mural", {}),
        loadKey("mlcs_missions", {}),
        loadKey("mlcs_trades", {}),
      ]);
      setAccounts(acc); setNpcs(np); setLetters(lt); setMural(mu); setMissions(mi); setTrades(tr);
      setLoading(false);
    })();
  }, []);

  const handleAuth = useCallback(async (acc, isNew) => {
    if (isNew) {
      const fresh = await loadKey("mlcs_accounts", {});
      const merged = { ...fresh, [acc.email]: acc };
      await saveKey("mlcs_accounts", merged);
      setAccounts(merged);
    }
    setSession({ email: acc.email, role: acc.role });
  }, []);

  const updateAccount = useCallback(async (email, patch) => {
    const fresh = await loadKey("mlcs_accounts", accounts);
    const merged = { ...fresh, [email]: { ...(fresh[email] || accounts[email]), ...patch } };
    setAccounts(merged);
    await saveKey("mlcs_accounts", merged);
  }, [accounts]);

  const addNpc = useCallback(async (npc) => {
    const fresh = await loadKey("mlcs_npcs", npcs);
    const merged = { ...fresh, [npc.id]: npc };
    setNpcs(merged);
    await saveKey("mlcs_npcs", merged);
  }, [npcs]);

  const updateNpc = useCallback(async (id, patch) => {
    const fresh = await loadKey("mlcs_npcs", npcs);
    const merged = { ...fresh, [id]: { ...(fresh[id] || npcs[id]), ...patch } };
    setNpcs(merged);
    await saveKey("mlcs_npcs", merged);
  }, [npcs]);

  const deleteNpc = useCallback(async (id) => {
    const fresh = await loadKey("mlcs_npcs", npcs);
    const rest = { ...fresh };
    delete rest[id];
    setNpcs(rest);
    await saveKey("mlcs_npcs", rest);
  }, [npcs]);

  const sendLetter = useCallback(async (letter) => {
    const fresh = await loadKey("mlcs_letters", letters);
    const merged = { ...fresh, [letter.id]: letter };
    setLetters(merged);
    await saveKey("mlcs_letters", merged);
  }, [letters]);

  const respondLetter = useCallback(async (id, patch) => {
    const fresh = await loadKey("mlcs_letters", letters);
    const merged = { ...fresh, [id]: { ...(fresh[id] || letters[id]), ...patch } };
    setLetters(merged);
    await saveKey("mlcs_letters", merged);
  }, [letters]);

  const saveMuralFn = useCallback(async (newMural) => { setMural(newMural); await saveKey("mlcs_mural", newMural); }, []);
  const saveMissionsFn = useCallback(async (newMissions) => { setMissions(newMissions); await saveKey("mlcs_missions", newMissions); }, []);
  const saveTradesFn = useCallback(async (newTrades) => { setTrades(newTrades); await saveKey("mlcs_trades", newTrades); }, []);

  const isMestra = session?.role === "mestra";
  const tabs = useMemo(() => [...TABS, ...(isMestra ? [{ id: "admin", label: "Painel da Mestra" }] : [])], [isMestra]);

  return (
    <div className="mlcs">
      <style>{FONTS}{THEME}</style>

      {loading ? (
        <div style={{ padding: 60, textAlign: "center", color: "var(--muted)" }}>Abrindo o mural...</div>
      ) : !session ? (
        <AuthScreen accounts={accounts} onAuth={handleAuth} />
      ) : (
        <div style={{ maxWidth: 1080, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 20px 12px" }}>
            <div>
              <h1 style={{ fontSize: 18 }}>🕯️ Mural dos Labores &amp; Cartas Secretas</h1>
              <p style={{ fontSize: 12, color: "var(--muted)", margin: "3px 0 0" }}>
                {accounts[session.email]?.name} · <span className="tag" style={{ marginLeft: 2 }}>{isMestra ? "Mestra" : "Jogador"}</span>
              </p>
            </div>
            <button className="btn btn-ghost" onClick={() => setSession(null)}>Sair</button>
          </div>

          <div className="tabbar">
            {tabs.map((t) => (
              <button key={t.id} className={`tab-btn ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>{t.label}</button>
            ))}
          </div>

          <div style={{ padding: "22px 20px 60px" }}>
            {activeTab === "perfil" && <PerfilTab session={session} accounts={accounts} updateAccount={updateAccount} isMestra={isMestra} />}
            {activeTab === "cartas" && <CartasTab session={session} isMestra={isMestra} npcs={npcs} accounts={accounts} letters={letters} sendLetter={sendLetter} />}
            {activeTab === "inventario" && <InventarioTab session={session} isMestra={isMestra} accounts={accounts} updateAccount={updateAccount} npcs={npcs} updateNpc={updateNpc} />}
            {activeTab === "trocas" && <TrocasTab session={session} isMestra={isMestra} accounts={accounts} updateAccount={updateAccount} npcs={npcs} updateNpc={updateNpc} trades={trades} saveTrades={saveTradesFn} />}
            {activeTab === "mural" && <MuralTab session={session} isMestra={isMestra} accounts={accounts} npcs={npcs} mural={mural} saveMural={saveMuralFn} />}
            {activeTab === "missoes" && <MissoesTab session={session} isMestra={isMestra} accounts={accounts} npcs={npcs} missions={missions} saveMissions={saveMissionsFn} />}
            {activeTab === "admin" && isMestra && <AdminPanel npcs={npcs} updateNpc={updateNpc} addNpc={addNpc} deleteNpc={deleteNpc} accounts={accounts} letters={letters} respondLetter={respondLetter} />}
          </div>
        </div>
      )}
    </div>
  );
}


        // Renderizando o App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
